      document.getElementById('questionText').style.fontSize = `${size * 1.4}px`;
      document.getElementById('btnOne').style.fontSize = `${size * 0.9}px`;
      document.getElementById('btnTwo').style.fontSize = `${size * 0.85}px`;
    }
    window.elementSdk.init({

      onConfigChange: async (config) => applyConfig(config),
