    html, body { margin: 0; padding: 0; height: 100%; box-sizing: border-box; }
    
    @keyframes fadeInScale {

      to { opacity: 1; transform: scale(1) rotateY(0); } 
    }
    @keyframes pulseGlowIntense { 
      0%, 100% { box-shadow: 0 0 30px rgba(0, 150, 255, 0.5), inset 0 0 20px rgba(0, 200, 255, 0.1); } 
      50% { box-shadow: 0 0 50px rgba(0, 150, 255, 0.7), inset 0 0 20px rgba(0, 200, 255, 0.2); } 
    }
    @keyframes floatBounce { 
      0%, 100% { transform: translateY(-8px); } 
      50% { transform: translateY(8px); } 
    }
    @keyframes slideInUp { 
      from { opacity: 0; transform: translateY(30px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    @keyframes shimmerEffect {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }
    
    .hero-card { animation: fadeInScale 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; perspective: 1000px; }

    .trust-stat { animation: slideInUp 1s cubic-bezier(0.25, 0.8, 0.25, 1) both; }
    .trust-stat:nth-child(1) { animation-delay: 0.8s; }
    .trust-stat:nth-child(2) { animation-delay: 1s; }
    .trust-stat:nth-child(3) { animation-delay: 1.2s; }
    
    .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); background-size: 1000px 100%; animation: shimmerEffect 3s infinite; }
    
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    .btn-primary:hover::before { width: 300px; height: 300px; }

    }
