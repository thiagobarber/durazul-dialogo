<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Durazul</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 20px rgba(0, 102, 204, 0.3); } 50% { box-shadow: 0 0 35px rgba(0, 102, 204, 0.55); } }
    .dialog-enter { animation: fadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .btn-glow { animation: pulseGlow 2.5s ease-in-out infinite; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .shimmer-bg { background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.08) 50%, transparent 70%); background-size: 200% 100%; animation: shimmer 3s infinite; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto relative flex items-center justify-center" style="background: linear-gradient(135deg, #ffffff 0%, #e8f4ff 40%, #f0f8ff 100%); font-family: 'DM Sans', sans-serif;"><!-- Ambient particles -->
   <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute w-72 h-72 rounded-full opacity-10" style="background: radial-gradient(circle, #0088ff, transparent); top: 10%; left: -5%;"></div>
    <div class="absolute w-96 h-96 rounded-full opacity-[0.08]" style="background: radial-gradient(circle, #00aaff, transparent); bottom: -10%; right: -8%;"></div>
   </div><!-- Dialog Box -->
   <div id="dialog" class="dialog-enter relative z-10 mx-4 w-full max-w-md rounded-2xl border border-blue-200/30 p-8 shadow-xl" style="background: linear-gradient(160deg, rgba(255,255,255,0.98), rgba(240,248,255,0.95)); backdrop-filter: blur(20px);"><!-- Close button --> <a href="https://app.monetizze.com.br/r/BPE1900896" target="_blank" rel="noopener noreferrer" id="closeBtn" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full text-blue-300/50 hover:text-blue-600 hover:bg-blue-100 transition-all"> <i data-lucide="x" style="width:18px; height:18px;"></i> </a> <!-- Icon -->
    <div class="flex justify-center mb-5">
     <div class="w-16 h-16 rounded-full flex items-center justify-center shimmer-bg" style="background-color: rgba(0,102,204,0.15); border: 1px solid rgba(0,102,204,0.3);"><i data-lucide="droplets" style="width:30px; height:30px; color: #3399ff;"></i>
     </div>
    </div><!-- Question -->
    <h2 id="questionText" class="text-center text-blue-900 font-bold text-xl leading-snug mb-2" style="font-family: 'Playfair Display', serif;">Quer melhorar seu desempenho e confiança?</h2>
    <p class="text-center text-sm text-blue-600/70 mb-7">Descubra a solução natural que já ajudou milhares de homens.</p><!-- Buttons -->
    <div class="space-y-3"><a href="https://app.monetizze.com.br/r/BPE1900896" target="_blank" rel="noopener noreferrer" id="btnOne" class="btn-glow block w-full text-center py-4 px-6 rounded-xl font-bold text-white text-base transition-all hover:brightness-110" style="background: linear-gradient(135deg, #0088ff, #00aaff);"> Sim, quero conhecer o Durazul! </a> <a href="https://app.monetizze.com.br/r/BPE1900896" target="_blank" rel="noopener noreferrer" id="btnTwo" class="block w-full text-center py-4 px-6 rounded-xl font-medium text-blue-600 text-sm border border-blue-300 hover:bg-blue-50 hover:text-blue-700 transition-all"> Quero saber mais antes de decidir </a>
    </div>
    <p class="text-center text-[11px] text-blue-500/50 mt-5">🔒 100% Seguro • Garantia de 90 dias</p>
   </div>
  </div>
  <script>
    lucide.createIcons();

    const PRODUCT_LINK = "https://app.monetizze.com.br/r/BPE1900896";

    const defaultConfig = {
      dialog_question: "Quer melhorar seu desempenho e confiança?",
      option_one: "Sim, quero conhecer o Durazul!",
      option_two: "Quero saber mais antes de decidir",
      background_color: "#ffffff",
      surface_color: "#e8f4ff",
      text_color: "#1e3a5f",
      primary_action_color: "#0088ff",
      secondary_action_color: "#0066cc",
      font_family: "DM Sans",
      font_size: 16
    };

    function applyConfig(config) {
      const q = document.getElementById('questionText');
      const b1 = document.getElementById('btnOne');
      const b2 = document.getElementById('btnTwo');
      const app = document.getElementById('app');

      q.textContent = config.dialog_question || defaultConfig.dialog_question;
      b1.textContent = config.option_one || defaultConfig.option_one;
      b2.textContent = config.option_two || defaultConfig.option_two;

      const font = config.font_family || defaultConfig.font_family;
      const size = config.font_size || defaultConfig.font_size;
      app.style.fontFamily = `${font}, sans-serif`;
      q.style.fontSize = `${size * 1.3}px`;
      b1.style.fontSize = `${size}px`;
      b2.style.fontSize = `${size * 0.875}px`;

      const bg = config.background_color || defaultConfig.background_color;
      const surface = config.surface_color || defaultConfig.surface_color;
      const txt = config.text_color || defaultConfig.text_color;
      const primary = config.primary_action_color || defaultConfig.primary_action_color;
      const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;

      app.style.background = `linear-gradient(135deg, ${bg} 0%, ${surface} 100%)`;
      q.style.color = txt;
      b1.style.background = `linear-gradient(135deg, ${primary}, ${secondary})`;
      b2.style.color = secondary;
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
          { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ["dialog_question", config.dialog_question || defaultConfig.dialog_question],
        ["option_one", config.option_one || defaultConfig.option_one],
        ["option_two", config.option_two || defaultConfig.option_two]
      ])
    });
  </script>
